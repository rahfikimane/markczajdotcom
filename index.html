    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
            background: #000;
            font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        html::-webkit-scrollbar { display: none; }

        #video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
        }

        .scrim {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.15), rgba(0,0,0,0.5));
            z-index: 0;
            pointer-events: none;
        }

        /* ── LOADER ── */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-bar-wrap {
            width: min(320px, 60vw);
            height: 1px;
            background: rgba(255,255,255,0.15);
            position: relative;
            overflow: hidden;
        }

        .loader-bar-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: rgba(255,255,255,0.8);
            transition: width 0.25s ease;
        }

        .loader-keyword {
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            min-height: 1.2em;
            text-align: center;
            opacity: 0;
            
        }

        .loader-keyword.visible { opacity: 1; }
        .loader-keyword.burst { color: rgba(255,255,255,0.8); letter-spacing: 0.25em; }

        /* ── MAIN CONTENT ── */
        .content-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
        }

        .content-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .name-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            text-align: center;
            padding: 0 1.5rem;
        }

        h1 {
            color: white;
            font-family: 'Jost', sans-serif;
            font-size: clamp(1.5rem, 7vw, 4rem);
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            padding-left: 0.6em;
            text-shadow: 0 2px 40px rgba(0,0,0,0.4);
            cursor: default;
            transition: text-shadow 0.5s ease;
        }

        h1:hover {
            text-shadow: 0 0 35px rgba(255,255,255,0.6), 0 0 70px rgba(255,255,255,0.18), 0 2px 40px rgba(0,0,0,0.4);
        }

        .divider {
            width: 40px;
            height: 0.5px;
            background: rgba(255,255,255,0.4);
            transition: width 0.5s ease, background 0.5s ease;
        }

        .name-block:hover .divider {
            width: 55px;
            background: rgba(255,255,255,0.65);
        }

        .subtitle {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: clamp(0.6rem, 1.8vw, 0.72rem);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
            line-height: 2;
            max-width: 680px;
            cursor: default;
        }

        .subtitle span:not(.sep) {
            display: inline-block;
            transition: color 0.35s ease, text-shadow 0.35s ease;
        }

        .subtitle span:not(.sep):hover {
            color: #fff;
            text-shadow: 0 0 22px rgba(255,255,255,0.65), 0 0 45px rgba(255,255,255,0.2);
        }

        .subtitle .sep {
            margin: 0 0.6em;
            color: rgba(255,255,255,0.25);
        }

        .subtitle-secondary {
            margin-top: -0.5rem;
            font-size: clamp(0.55rem, 1.5vw, 0.63rem);
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.2em;
        }

        .subtitle-secondary span:not(.sep) {
            display: inline-block;
            transition: color 0.35s ease, text-shadow 0.35s ease;
        }

        .subtitle-secondary span:not(.sep):hover {
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 18px rgba(255,255,255,0.5);
        }

        .linkedin-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.3rem;
            text-decoration: none;
            color: rgba(255,255,255,0.45);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: clamp(0.58rem, 1.5vw, 0.65rem);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            transition: color 0.35s ease, text-shadow 0.35s ease;
            pointer-events: all;
        }

        .linkedin-link:hover {
            color: rgba(255,255,255,0.95);
            text-shadow: 0 0 18px rgba(255,255,255,0.45);
        }

        .linkedin-link svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .subtitle .sep { display: none; }
            .subtitle span { display: block; margin: 0.15rem 0; }
        }
    </style>

    <script>
        const phase1 = [
            "15+ years of experience",
            "defense",
            "Microsoft O365 architect",
            "Power Platform solutions",
            "ServiceNow IRM & GRC",
            "compliance automation",
            "audit workflow design",
            "trusted technical advisor",
            "real-time insights",
            "SharePoint custom development",
            "security-first architecture"
        ];

        const phase2 = [
            "scalable systems",
            "zero-trust security",
            "stakeholder alignment",
            "GRC frameworks",
            "low-code automation",
            "federal compliance",
            "platform integration",
            "data-driven insights",
            "agile delivery",
            "solutions that deliver"
        ];

        const kwEl = document.getElementById('loader-kw');
        const barEl = document.getElementById('loader-bar');
        const loader = document.getElementById('loader');
        const content = document.getElementById('main-content');

        function fadeOut(el, duration, cb) {
            const start = performance.now();
            (function tick(now) {
                const t = Math.min((now - start) / duration, 1);
                el.style.opacity = 1 - t;
                if (t < 1) requestAnimationFrame(tick);
                else { el.style.opacity = 0; cb(); }
            })(performance.now());
        }

        function fadeIn(el, duration) {
            el.style.opacity = 0;
            const start = performance.now();
            (function tick(now) {
                const t = Math.min((now - start) / duration, 1);
                el.style.opacity = t;
                if (t < 1) requestAnimationFrame(tick);
                else el.style.opacity = 1;
            })(performance.now());
        }

        function flash(text, progress, isBurst, cb) {
            const isLast = text === "solutions that last";
            const outDur = isBurst ? 55 : 130;
            const inDur  = isBurst ? 55 : 130;
            const hold   = isLast ? 900 : isBurst ? 90 : 320;
            fadeOut(kwEl, outDur, () => {
                kwEl.textContent = text;
                kwEl.classList.toggle('burst', isBurst);
                barEl.style.width = progress + '%';
                fadeIn(kwEl, inDur);
                setTimeout(cb, hold);
            });
        }

        function runPhase(list, startPct, endPct, isBurst, done) {
            let i = 0;
            function next() {
                if (i >= list.length) { done(); return; }
                const pct = startPct + ((i + 1) / list.length) * (endPct - startPct);
                flash(list[i], pct, isBurst, next);
                i++;
            }
            next();
        }

        runPhase(phase1, 0, 65, false, () => {
            runPhase(phase2, 65, 100, true, () => {
                setTimeout(() => {
                    loader.classList.add('hidden');
                    content.classList.add('visible');
                }, 250);
            });
        });
    </script>
